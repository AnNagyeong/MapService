<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>길찾기 테스트</title>
</head>
<body>

<h2>캠퍼스 길찾기 테스트</h2>

출발지:
<select id="start">
  <option value="1">정보문화관 정문</option>
  <option value="18">도서관 쪽문</option>
</select>

도착지:
<select id="end">
  <option value="1">정보문화관 정문</option>
  <option value="18">도서관 쪽문</option>
</select>

<br><br>

<label>
  <input type="checkbox" id="wheelchair">
  휠체어 모드 (계단 회피)
</label>

<br><br>

<button onclick="findRoute()">길찾기</button>

<h3>결과</h3>
<div id="result"></div>

<script>


let edges = [];

fetch("edge.json")
  .then(response => response.json())
  .then(data => {
    edges = data;
    console.log("edge 데이터 로드 완료:", edges);
  })
  .catch(error => {
    console.error("edge.json 로드 실패:", error);
  });
// 여기 지금 가지고 있는 dijkstra 함수 그대로 붙이면 됨
function dijkstra(edges, startId, endId, wheelchairMode = false) {
    
  // 휠체어 모드면 stair 엣지 제거
  const filtered = wheelchairMode
    ? edges.filter(e => e.type !== "stair")
    : edges;

  // 그래프 구성 (양방향)
  const graph = {};
  for (const e of filtered) {
    if (!graph[e.from]) graph[e.from] = [];
    if (!graph[e.to])   graph[e.to]   = [];
    graph[e.from].push({ node: e.to,   weight: e.weight });
    graph[e.to].push  ({ node: e.from, weight: e.weight });
  }

  // 최단거리 탐색
  const dist = {}, prev = {}, visited = new Set();
  for (const n of Object.keys(graph)) dist[n] = Infinity;
  dist[startId] = 0;
  const queue = [[0, startId]];

  while (queue.length) {
    queue.sort((a, b) => a[0] - b[0]);
    const [d, u] = queue.shift();
    if (visited.has(u)) continue;
    visited.add(u);
    for (const { node: v, weight } of graph[u] || []) {
      if (dist[u] + weight < dist[v]) {
        dist[v] = dist[u] + weight;
        prev[v] = u;
        queue.push([dist[v], v]);
      }
    }
  }

  // 경로 역추적
  const path = [];
  let cur = String(endId);
  while (cur) { path.unshift(Number(cur)); cur = prev[cur]; }

  return { path, distance: dist[endId] };
  
}


function findRoute() {

  const start = Number(
    document.getElementById("start").value
  );

  const end = Number(
    document.getElementById("end").value
  );

  const wheelchair =
    document.getElementById("wheelchair").checked;

  const result =
    dijkstra(edges, start, end, wheelchair);

  document.getElementById("result").innerHTML =
    "경로: " + result.path.join(" → ") +
    "<br>거리: " + result.distance;

}

</script>

</body>
</html>
